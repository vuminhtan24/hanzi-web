<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — ChineseNois</title>
  <link rel="stylesheet" href="/static/css/shared.css">
  <style>
    .blog-hero { background:var(--ink);padding:3rem clamp(1rem,5vw,3rem);text-align:center; }
    .blog-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem;padding:2.5rem clamp(1rem,5vw,3rem); }
    .blog-card { background:var(--white);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);transition:transform var(--transition),box-shadow var(--transition);cursor:pointer; }
    .blog-card:hover { transform:translateY(-4px);box-shadow:var(--shadow); }
    .blog-card__thumb { aspect-ratio:16/9;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:3.5rem;overflow:hidden; }
    .blog-card__thumb img { width:100%;height:100%;object-fit:cover;transition:transform .4s; }
    .blog-card:hover .blog-card__thumb img { transform:scale(1.06); }
    .blog-card__body { padding:1.25rem; }
    .blog-card__title { font-weight:700;font-size:1rem;margin-bottom:.5rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }
    .blog-card__excerpt { font-size:.85rem;color:var(--gray-600);line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden; }
    .blog-card__date { font-size:.75rem;color:var(--gray-400);margin-top:.75rem; }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="/" class="navbar__logo">🀄 Chinese<span>Nois</span></a>
  <div class="navbar__links"><a href="/">Trang chủ</a><a href="/products">Sản phẩm</a><a href="/blog">Blog</a><a href="/account">Tài khoản</a></div>
  <div class="navbar__actions" id="nav-actions"></div>
  <a href="/cart" class="navbar__cart" style="margin-left:.5rem">🛒 Giỏ <span class="cart-badge" style="display:none">0</span></a>
  <button class="hamburger"><span></span><span></span><span></span></button>
</nav>

<div class="blog-hero">
  <div class="section__tag">📚 Blog</div>
  <h1 style="color:var(--white);margin-top:.75rem">Học tiếng Trung<br><span style="color:var(--gold)">dễ dàng hơn</span></h1>
  <p style="color:var(--gray-400);margin-top:.75rem;max-width:480px;margin-left:auto;margin-right:auto">Mẹo học, phương pháp và kinh nghiệm từ những người đã thành thạo tiếng Trung</p>
</div>

<div class="blog-grid" id="blog-grid">
  <div class="loading-state" style="grid-column:1/-1"><div class="spinner"></div></div>
</div>

<footer class="footer">
  <div class="footer__bottom">
    <span>© 2024 ChineseNois</span>
    <div class="footer__social"><a href="#">f</a><a href="#">T</a></div>
  </div>
</footer>
<div class="toast-container"></div>
<script src="/static/js/app.js"></script>
<script>
function stripHtml(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  return div.textContent || div.innerText || '';
}

async function loadBlogs() {
  const grid = document.getElementById('blog-grid');
  try {
    const blogs = await api('GET', '/api/blogs');
    if (blogs.length === 0) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state__icon">📝</div><div class="empty-state__title">Chưa có bài viết</div></div>';
      return;
    }
    grid.innerHTML = blogs.map(b => `
      <div class="blog-card" onclick="location.href='/blog/${b.id}'">
        <div class="blog-card__thumb">
          ${b.thumbnail ? `<img src="${b.thumbnail}" alt="${b.title}" loading="lazy">` : '📖'}
        </div>
        <div class="blog-card__body">
          <div class="blog-card__title">${b.title}</div>
          <div class="blog-card__excerpt">${stripHtml(b.content).substring(0,180)}...</div>
          <div class="blog-card__date">🗓 ${fmtDate(b.created_at)}</div>
        </div>
      </div>
    `).join('');
  } catch(e) { grid.innerHTML = '<p style="grid-column:1/-1;color:var(--red)">Lỗi tải bài viết</p>'; }
}
document.addEventListener('DOMContentLoaded', () => { initNavAuth(); loadBlogs(); });
</script>
</body>
</html>

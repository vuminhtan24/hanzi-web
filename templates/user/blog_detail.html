<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog chi tiết — ChineseNois</title>
  <link rel="stylesheet" href="/static/css/shared.css">
  <style>
    .blog-article { max-width:800px;margin:0 auto;padding:2.5rem clamp(1rem,5vw,2rem); }
    .blog-article h1 { font-size:clamp(1.5rem,4vw,2.25rem);margin-bottom:1rem;line-height:1.3; }
    .blog-content { line-height:1.85;color:var(--ink-mid);font-size:1rem; }
    .blog-content h2,h3 { font-family:var(--font-heading);color:var(--ink);margin:1.75rem 0 .75rem; }
    .blog-content p { margin-bottom:1rem; }
    .blog-content ul,ol { margin:.75rem 0 1rem 1.5rem;list-style:disc; }
    .blog-content li { margin-bottom:.4rem; }
    .blog-content strong { color:var(--ink); }
    .blog-content img { border-radius:var(--radius);margin:1rem 0; }
    .blog-thumbnail { width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:var(--radius-lg);margin-bottom:1.5rem; }
    .blog-meta { display:flex;gap:1.5rem;font-size:.82rem;color:var(--gray-600);margin-bottom:1.5rem;flex-wrap:wrap; }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="/" class="navbar__logo">🀄 Chinese<span>Nois</span></a>
  <div class="navbar__links"><a href="/">Trang chủ</a><a href="/products">Sản phẩm</a><a href="/blog">Blog</a><a href="/account">Tài khoản</a></div>
  <div class="navbar__actions" id="nav-actions"></div>
  <a href="/cart" class="navbar__cart" style="margin-left:.5rem">🛒 Giỏ <span class="cart-badge" style="display:none">0</span></a>
  <button class="hamburger"><span></span><span></span><span></span></button>
</nav>

<div style="padding:.75rem clamp(1rem,5vw,3rem);background:var(--white);border-bottom:1px solid var(--gray-100)">
  <div class="breadcrumb"><a href="/">Trang chủ</a><span>›</span><a href="/blog">Blog</a><span>›</span><span id="bc-title">...</span></div>
</div>

<div id="blog-loading" class="loading-state" style="padding:5rem"><div class="spinner"></div></div>

<article class="blog-article" id="blog-article" style="display:none">
  <img id="blog-thumb" class="blog-thumbnail" style="display:none" alt="">
  <h1 id="blog-title"></h1>
  <div class="blog-meta" id="blog-meta"></div>
  <div class="blog-content" id="blog-content"></div>
  <hr style="margin:2.5rem 0;border:none;border-top:1px solid var(--gray-100)">
  <a href="/blog" class="btn btn-ghost">← Quay lại Blog</a>
</article>

<div class="toast-container"></div>
<script src="/static/js/app.js"></script>
<script>
const blogId = {{ blog_id }};
async function loadBlog() {
  try {
    const b = await api('GET', `/api/blogs/${blogId}`);
    document.getElementById('blog-loading').style.display = 'none';
    document.getElementById('blog-article').style.display = '';
    document.getElementById('bc-title').textContent = b.title;
    document.title = b.title + ' — ChineseNois';
    if (b.thumbnail) { const t = document.getElementById('blog-thumb'); t.src = b.thumbnail; t.style.display = ''; }
    document.getElementById('blog-title').textContent = b.title;
    document.getElementById('blog-meta').innerHTML = `<span>🗓 ${fmtDate(b.created_at)}</span><span>📖 ~${Math.ceil(b.content.replace(/<[^>]+>/g,'').length/500)} phút đọc</span>`;
    document.getElementById('blog-content').innerHTML = b.content;
  } catch(e) {
    document.getElementById('blog-loading').innerHTML = '<div class="empty-state"><div class="empty-state__icon">😕</div><div class="empty-state__title">Bài viết không tồn tại</div><a href="/blog" class="btn btn-primary mt-2">Quay lại Blog</a></div>';
  }
}
document.addEventListener('DOMContentLoaded', () => { initNavAuth(); loadBlog(); });
</script>
</body>
</html>

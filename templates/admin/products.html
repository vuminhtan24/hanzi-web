<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý sản phẩm — ChineseNois Admin</title>
  <link rel="stylesheet" href="/static/css/shared.css">
  <style>
    .product-thumb { width:48px;height:48px;border-radius:var(--radius-sm);object-fit:cover;background:var(--gray-100);display:inline-flex;align-items:center;justify-content:center;font-size:1.25rem;vertical-align:middle; }
    .modal.wide { max-width:680px; }
    .img-preview { width:120px;height:120px;border-radius:var(--radius);object-fit:cover;border:2px dashed var(--gray-200);display:flex;align-items:center;justify-content:center;font-size:2rem;overflow:hidden;cursor:pointer; }
    .img-preview img { width:100%;height:100%;object-fit:cover; }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="/" class="navbar__logo">🀄 Chinese<span>Nois</span> <em style="font-size:.7em;opacity:.7">Admin</em></a>
  <div class="navbar__actions"><button onclick="Auth.logout()" class="btn btn-ghost btn-sm" style="color:var(--gray-200);border-color:rgba(255,255,255,.2)">Đăng xuất</button></div>
</nav>

<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar__section">Tổng quan</div>
    <a href="/admin" class="sidebar__link">📊 Dashboard</a>
    <div class="sidebar__section">Quản lý</div>
    <a href="/admin/products" class="sidebar__link active">📦 Sản phẩm</a>
    <a href="/admin/orders" class="sidebar__link">🛒 Đơn hàng</a>
    <a href="/admin/users" class="sidebar__link">👥 Khách hàng</a>
    <a href="/admin/blogs" class="sidebar__link">📝 Blog</a>
    <div class="sidebar__section">Khác</div>
    <a href="/" class="sidebar__link">🌐 Xem website</a>
  </aside>

  <main class="admin-content">
    <div class="page-title">
      📦 Quản lý sản phẩm
      <button class="btn btn-primary btn-sm" onclick="openCreateModal()">+ Thêm sản phẩm</button>
    </div>

    <!-- Search/Filter bar -->
    <div style="display:flex;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap">
      <input type="text" class="form-control" id="search-prod" placeholder="Tìm kiếm sản phẩm..." style="max-width:280px" oninput="debounceSearch()">
      <select class="form-control" id="filter-cat" style="max-width:180px" onchange="loadProducts()">
        <option value="">Tất cả danh mục</option>
      </select>
      <span class="badge" style="background:var(--gray-100);color:var(--gray-600);padding:.45rem .75rem;align-self:center" id="total-count"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Ảnh</th><th>Tên sản phẩm</th><th>Danh mục</th><th>Giá</th><th>Tồn kho</th><th>Lá bài</th><th>Trạng thái</th><th>Hành động</th></tr>
        </thead>
        <tbody id="products-table">
          <tr><td colspan="8" class="text-center"><div class="loading-state" style="padding:2rem"><div class="spinner"></div></div></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Create/Edit Product Modal -->
<div class="modal-overlay" id="product-modal">
  <div class="modal wide">
    <div class="modal__header">
      <span class="modal__title" id="modal-title">Thêm sản phẩm</span>
      <button class="modal__close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal__body">
      <input type="hidden" id="edit-id">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Ảnh sản phẩm</label>
          <div class="img-preview" id="img-preview" onclick="document.getElementById('img-input').click()">
            <span id="img-placeholder">📷</span>
            <img id="img-preview-img" style="display:none">
          </div>
          <input type="file" id="img-input" accept="image/*" style="display:none" onchange="previewImage(this)">
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Tên sản phẩm *</label>
          <input type="text" class="form-control" id="p-name" placeholder="VD: Bộ bài Động vật">
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Mô tả</label>
          <textarea class="form-control" id="p-desc" rows="3" placeholder="Mô tả sản phẩm..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Giá bán (₫) *</label>
          <input type="number" class="form-control" id="p-price" placeholder="125000">
        </div>
        <div class="form-group">
          <label class="form-label">Giá gốc (₫)</label>
          <input type="number" class="form-control" id="p-original-price" placeholder="150000">
        </div>
        <div class="form-group">
          <label class="form-label">Tồn kho *</label>
          <input type="number" class="form-control" id="p-stock" placeholder="50">
        </div>
        <div class="form-group">
          <label class="form-label">Số lá bài</label>
          <input type="number" class="form-control" id="p-cards" placeholder="60">
        </div>
        <div class="form-group">
          <label class="form-label">Danh mục *</label>
          <select class="form-control" id="p-category"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Trình độ</label>
          <select class="form-control" id="p-level">
            <option value="">--</option>
            <option>Cơ bản</option><option>HSK 1</option><option>HSK 2</option><option>HSK 3</option><option>HSK 4</option>
          </select>
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:.75rem">
          <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.9rem">
            <input type="checkbox" id="p-featured" style="accent-color:var(--red)"> Sản phẩm nổi bật
          </label>
          <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.9rem">
            <input type="checkbox" id="p-new" style="accent-color:var(--red)"> Sản phẩm mới
          </label>
        </div>
      </div>
      <div style="display:flex;gap:.75rem;margin-top:1rem">
        <button class="btn btn-primary" onclick="saveProduct()" id="save-btn">Lưu sản phẩm</button>
        <button class="btn btn-ghost" onclick="closeModal()">Hủy</button>
      </div>
    </div>
  </div>
</div>

<!-- Delete confirm -->
<div class="modal-overlay" id="del-modal">
  <div class="modal" style="max-width:380px">
    <div class="modal__body" style="text-align:center;padding:2rem">
      <div style="font-size:3rem;margin-bottom:1rem">⚠️</div>
      <h3 style="margin-bottom:.5rem">Xóa sản phẩm?</h3>
      <p style="color:var(--gray-600);font-size:.88rem;margin-bottom:1.5rem">Hành động này không thể hoàn tác.</p>
      <div style="display:flex;gap:.75rem;justify-content:center">
        <button class="btn btn-primary" style="background:var(--red)" onclick="confirmDelete()" id="confirm-del-btn">Xóa</button>
        <button class="btn btn-ghost" onclick="document.getElementById('del-modal').classList.remove('open')">Hủy</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-container"></div>
<script src="/static/js/app.js"></script>
<script>
let deleteId = null;
let categories = [];
let searchTimer;

function debounceSearch(){ clearTimeout(searchTimer); searchTimer=setTimeout(loadProducts,400); }

function previewImage(input) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    const previewImg = document.getElementById('img-preview-img');
    previewImg.src = e.target.result;
    previewImg.style.display = '';
    document.getElementById('img-placeholder').style.display = 'none';
  };
  reader.readAsDataURL(input.files[0]);
}

function resetImagePreview() {
  const previewImg = document.getElementById('img-preview-img');
  previewImg.src = '';
  previewImg.style.display = 'none';
  document.getElementById('img-placeholder').style.display = '';
  document.getElementById('img-input').value = '';
}

async function loadCategories() {
  categories = await api('GET', '/api/categories');
  const selCat = document.getElementById('p-category');
  const filterCat = document.getElementById('filter-cat');
  selCat.innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  filterCat.innerHTML = '<option value="">Tất cả danh mục</option>' + categories.map(c => `<option value="${c.slug}">${c.name}</option>`).join('');
}

async function loadProducts() {
  const search = document.getElementById('search-prod').value;
  const cat = document.getElementById('filter-cat').value;
  let url = `/api/products?limit=50`;
  if (search) url += `&search=${encodeURIComponent(search)}`;
  if (cat) url += `&category=${cat}`;
  const d = await api('GET', url);
  document.getElementById('total-count').textContent = `${d.total} sản phẩm`;
  const tbody = document.getElementById('products-table');
  if (!d.products.length) { tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">Không có sản phẩm</td></tr>'; return; }
  tbody.innerHTML = d.products.map(p => `
    <tr>
      <td>${p.image ? `<img src="${p.image}" class="product-thumb">` : '<span class="product-thumb">🀄</span>'}</td>
      <td><b>${p.name}</b>${p.level ? `<br><span style="font-size:.75rem;color:var(--gray-600)">${p.level}</span>` : ''}</td>
      <td>${p.category || '—'}</td>
      <td style="color:var(--red);font-weight:700">${fmtPrice(p.price)}</td>
      <td><span style="color:${p.stock>0?'var(--green)':'var(--red)'}">${p.stock}</span></td>
      <td>${p.card_count || '—'}</td>
      <td>
        ${p.is_featured ? '<span class="badge" style="background:#FEF3C7;color:#92400E">⭐ Nổi bật</span>' : ''}
        ${p.is_new ? '<span class="badge" style="background:#D1FAE5;color:#065F46">🆕 Mới</span>' : ''}
      </td>
      <td>
        <div style="display:flex;gap:.5rem">
          <button class="btn btn-ghost btn-sm" onclick="openEditModal(${JSON.stringify(p).replace(/"/g,'&quot;')})">✏ Sửa</button>
          <button class="btn btn-sm" style="background:#FEE2E2;color:var(--red)" onclick="askDelete(${p.id})">🗑</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function openCreateModal() {
  document.getElementById('modal-title').textContent = 'Thêm sản phẩm mới';
  document.getElementById('edit-id').value = '';
  document.getElementById('p-name').value = '';
  document.getElementById('p-desc').value = '';
  document.getElementById('p-price').value = '';
  document.getElementById('p-original-price').value = '';
  document.getElementById('p-stock').value = '';
  document.getElementById('p-cards').value = '';
  document.getElementById('p-level').value = '';
  document.getElementById('p-featured').checked = false;
  document.getElementById('p-new').checked = true;
  resetImagePreview();
  document.getElementById('product-modal').classList.add('open');
}

function openEditModal(p) {
  document.getElementById('modal-title').textContent = 'Chỉnh sửa sản phẩm';
  document.getElementById('edit-id').value = p.id;
  document.getElementById('p-name').value = p.name;
  document.getElementById('p-desc').value = p.description;
  document.getElementById('p-price').value = p.price;
  document.getElementById('p-original-price').value = p.original_price || '';
  document.getElementById('p-stock').value = p.stock;
  document.getElementById('p-cards').value = p.card_count;
  document.getElementById('p-level').value = p.level || '';
  document.getElementById('p-featured').checked = p.is_featured;
  document.getElementById('p-new').checked = p.is_new;
  document.getElementById('p-category').value = p.category_id;
  if (p.image) {
    const previewImg = document.getElementById('img-preview-img');
    previewImg.src = p.image;
    previewImg.style.display = '';
    document.getElementById('img-placeholder').style.display = 'none';
  } else {
    resetImagePreview();
  }
  document.getElementById('product-modal').classList.add('open');
}

function closeModal() { document.getElementById('product-modal').classList.remove('open'); }

async function saveProduct() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Đang lưu...';
  const editId = document.getElementById('edit-id').value;
  const fd = new FormData();
  fd.append('name', document.getElementById('p-name').value);
  fd.append('description', document.getElementById('p-desc').value);
  fd.append('price', document.getElementById('p-price').value);
  const op = document.getElementById('p-original-price').value;
  if (op) fd.append('original_price', op);
  fd.append('stock', document.getElementById('p-stock').value);
  fd.append('card_count', document.getElementById('p-cards').value || 0);
  fd.append('category_id', document.getElementById('p-category').value);
  fd.append('level', document.getElementById('p-level').value);
  fd.append('is_featured', document.getElementById('p-featured').checked);
  fd.append('is_new', document.getElementById('p-new').checked);
  const imgInput = document.getElementById('img-input');
  if (imgInput && imgInput.files[0]) fd.append('image', imgInput.files[0]);
  try {
    if (editId) { await apiForm('PUT', `/api/products/${editId}`, fd); toast('Cập nhật thành công!','success'); }
    else { await apiForm('POST', '/api/products', fd); toast('Thêm sản phẩm thành công!','success'); }
    closeModal(); loadProducts();
  } catch(e) { toast(e.message,'error'); }
  btn.disabled = false; btn.textContent = 'Lưu sản phẩm';
}

function askDelete(id) { deleteId = id; document.getElementById('del-modal').classList.add('open'); }

async function confirmDelete() {
  try {
    await api('DELETE', `/api/products/${deleteId}`);
    toast('Đã xóa sản phẩm','success');
    document.getElementById('del-modal').classList.remove('open');
    loadProducts();
  } catch(e) { toast(e.message,'error'); }
}

async function init() {
  const user = await Auth.getUser();
  if (!user || !user.is_admin) { location.href = '/'; return; }
  await loadCategories();
  loadProducts();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
